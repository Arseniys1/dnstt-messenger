<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DNSTT Messenger</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="screen-connect" class="screen active">
  <div class="card">
    <h1 class="logo">DNSTT Messenger</h1>
    <div id="tab-bar">
      <button class="tab active" data-tab="login" id="tab-btn-login">Login</button>
      <button class="tab" data-tab="register" id="tab-btn-register">Register</button>
      <button class="tab" data-tab="settings" id="tab-btn-settings">Settings</button>
    </div>
    <div id="tab-login" class="tab-content active">
      <input id="login-user" type="text" placeholder="Login" autocomplete="off" />
      <input id="login-pass" type="password" placeholder="Password" />
      <button id="btn-login" class="btn-primary">Sign in</button>
    </div>
    <div id="tab-register" class="tab-content">
      <input id="reg-user" type="text" placeholder="Login" autocomplete="off" />
      <input id="reg-pass" type="password" placeholder="Password" />
      <button id="btn-register" class="btn-primary">Create account</button>
    </div>
    <div id="tab-settings" class="tab-content">
      <label id="label-server">Server address</label>
      <input id="cfg-server" type="text" placeholder="host:port" />
      <label id="label-proxy">SOCKS5 proxy (dnstt)</label>
      <input id="cfg-proxy" type="text" placeholder="127.0.0.1:18000" />
      <label class="row-label">
        <input id="cfg-direct" type="checkbox" />
        <span id="label-direct">Direct connection (no proxy)</span>
      </label>
      <label id="label-language">Language</label>
      <select id="cfg-language">
        <option value="en">English</option>
        <option value="ru">Русский</option>
        <option value="zh">简体中文</option>
        <option value="fa">فارسی</option>
        <option value="tr">Türkçe</option>
      </select>
      <button id="btn-save-cfg" class="btn-secondary">Save</button>
      <label id="label-known-servers" style="margin-top:12px">Network servers (click to switch)</label>
      <div id="server-list-container"><small id="server-list-hint">Available after sign in</small></div>
    </div>
    <div id="connect-status" class="status"></div>
  </div>
</div>
<div id="screen-chat" class="screen">
  <aside id="sidebar">
    <div id="sidebar-header">
      <span id="my-username"></span>
      <button id="btn-logout" title="Sign out">&#x23FB;</button>
    </div>
    <div class="sidebar-section-label" id="sidebar-global-label">Global chat</div>
    <ul id="sidebar-nav">
      <li id="nav-global" class="nav-item active" data-view="global">
        <span class="nav-icon">#</span> <span id="nav-global-text">General</span>
      </li>
    </ul>
    <div class="sidebar-section-label">
      <span id="sidebar-dm-label">Direct messages</span>
      <button id="btn-new-dm" class="btn-section-add" title="New direct message">+</button>
    </div>
    <ul id="dm-list"></ul>
    <div class="sidebar-section-label">
      <span id="sidebar-rooms-label">Rooms</span>
      <button id="btn-create-room" class="btn-section-add" title="Create room">+</button>
    </div>
    <ul id="room-list-sidebar"></ul>
    <div class="sidebar-section-label" id="sidebar-online-label">Online</div>
    <ul id="online-list"></ul>
  </aside>
  <main id="chat-area">
    <div id="chat-header">
      <span id="chat-title">General chat</span>
      <div id="chat-header-actions"></div>
    </div>
    <div id="messages"></div>
    <div id="input-bar">
      <textarea id="msg-input" placeholder="Message..." rows="1"></textarea>
      <button id="btn-send">&#x27A4;</button>
    </div>
  </main>
</div>
<div id="modal-dm" class="modal-overlay hidden">
  <div class="modal">
    <h3 id="modal-dm-title">New direct message</h3>
    <input id="dm-target-user" type="text" placeholder="User login" autocomplete="off" />
    <div class="modal-actions">
      <button id="btn-dm-cancel" class="btn-secondary">Cancel</button>
      <button id="btn-dm-open" class="btn-primary">Open</button>
    </div>
  </div>
</div>
<div id="modal-create-room" class="modal-overlay hidden">
  <div class="modal">
    <h3 id="modal-room-title">Create room</h3>
    <input id="room-name-input" type="text" placeholder="Room name" autocomplete="off" />
    <input id="room-desc-input" type="text" placeholder="Description (optional)" />
    <label class="row-label">
      <input id="room-public-check" type="checkbox" />
      <span id="room-public-label">Public (visible to everyone)</span>
    </label>
    <div class="modal-actions">
      <button id="btn-create-room-cancel" class="btn-secondary">Cancel</button>
      <button id="btn-create-room-ok" class="btn-primary">Create</button>
    </div>
  </div>
</div>
<div id="modal-invite" class="modal-overlay hidden">
  <div class="modal">
    <h3 id="modal-invite-title">Invite to room</h3>
    <input id="invite-username" type="text" placeholder="User login" autocomplete="off" />
    <div class="modal-actions">
      <button id="btn-invite-cancel" class="btn-secondary">Cancel</button>
      <button id="btn-invite-ok" class="btn-primary">Invite</button>
    </div>
  </div>
</div>
<script src="i18n.js"></script>
<script src="app.js"></script>
</body>
</html>
